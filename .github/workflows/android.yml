name: Android APK

on:
  push:
    branches: [main, "claude/**", "feat/**"]
    paths:
      - "android/**"
      - "crates/gravital-talk-ffi/**"
      - "crates/gravital-talk-transport/**"
      - "crates/gravital-talk-core/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - "crates/gravital-talk-ffi/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: "26.3.11579264"
  RUST_TARGETS: "aarch64-linux-android armv7-linux-androideabi x86_64-linux-android"

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java 17 ───────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # ── Android SDK + NDK ─────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      # ── Rust toolchain + Android targets ──────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGETS }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: android-ffi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # ── Compile Rust → .so for all Android ABIs ───────────────────────────────
      - name: Build native libraries
        run: |
          cd $GITHUB_WORKSPACE
          for target in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android; do
            cargo ndk -t $target \
              -o android/app/src/main/jniLibs \
              build -p gravital-talk-ffi \
              --features android \
              --release
          done
          echo "Built libraries:"
          find android/app/src/main/jniLibs -name "*.so" -ls

      # ── Build APK ─────────────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── Upload APK artifact ───────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gravital-talk-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh $APK | cut -f1)
          echo "## Android APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** \`app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above, install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "adb install app-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  build-release-apk:
    name: Build release APK (signed)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-apk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGETS }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: android-ffi-release

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build native libraries
        run: |
          cd $GITHUB_WORKSPACE
          for target in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android; do
            cargo ndk -t $target \
              -o android/app/src/main/jniLibs \
              build -p gravital-talk-ffi \
              --features android \
              --release
          done

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: gravital-talk-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
